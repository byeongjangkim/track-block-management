# ─────────────────────────────────────────────────────────────────
# [모드 B] 기존 team-work-manager nginx에 추가할 location 블록
#
# 적용 방법:
#   1. team-work-manager의 nginx 설정 파일에 아래 블록을 추가하거나
#   2. /etc/nginx/conf.d/ 에 이 파일을 복사 후 nginx reload
#
# 전제:
#   - tbm-frontend 컨테이너가 tbm-net에서 포트 80 수신 중
#   - 기존 nginx와 tbm-frontend가 같은 Docker 네트워크에 있거나
#     tbm-frontend에 포트 매핑 없이 nginx에서 직접 컨테이너명으로 접근
#
# Docker 네트워크 연결 방법:
#   docker network connect tbm-net <기존_nginx_컨테이너명>
# ─────────────────────────────────────────────────────────────────

# /track/ 경로 → 선로차단작업 관리
location /track {
    # SPA: /track/ 이하 URI를 frontend 컨테이너로 전달
    proxy_pass         http://tbm-frontend:80;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # SPA 경로 재작성: /track → /track/ (trailing slash 보장)
    rewrite ^/track$ /track/ permanent;
}

# /track/api/ → 백엔드 API (frontend 경유 없이 직접 프록시)
location /track/api/ {
    proxy_pass         http://tbm-backend:7000/api/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    client_max_body_size 25m;
}
